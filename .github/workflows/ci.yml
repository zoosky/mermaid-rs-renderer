name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo check --locked --no-default-features
      - run: cargo check --locked --no-default-features --features cli
      - run: cargo check --locked --no-default-features --features png
      - run: cargo test --all-targets --all-features
      - run: cargo test --no-default-features --lib
      - run: cargo test --doc --all-features
      - run: cargo test --benches --no-run
      - run: cargo package --locked
      - name: Test compile packaged crate
        run: |
          set -euo pipefail
          version="$(awk -F'\"' '/^version = "/ { print $2; exit }' Cargo.toml)"
          tmpdir="$(mktemp -d)"
          tar -xzf "target/package/mermaid-rs-renderer-${version}.crate" -C "${tmpdir}"
          cargo test \
            --manifest-path "${tmpdir}/mermaid-rs-renderer-${version}/Cargo.toml" \
            --all-targets \
            --all-features \
            --locked \
            --no-run
